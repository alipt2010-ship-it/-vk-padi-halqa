<!DOCTYPE html>
<html lang="ml">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>V K Padi Halqa</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f5f5f5;
}
header{
    background:#0d6efd;
    color:white;
    padding:20px;
    text-align:center;
}
section{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:10px;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
th{
    background:#0d6efd;
    color:white;
}
</style>
</head>

<body>

<header>
<h1>V K Padi Halqa</h1>
<p>അറിയിപ്പുകളും വരുമാന-ചെലവ് കണക്കുകളും</p>
</header>

<section>
<h2>📢 അറിയിപ്പുകൾ</h2>
<p id="meeting"></p>
</section>

<section>
<h2>📊 മാസ കണക്ക്</h2>

<p><strong>പഴയ ബാലൻസ്:</strong>
<span id="old_balance"></span></p>

<table>
<tr>
<th>മാസം</th>
<th>വരുമാനം</th>
<th>ചെലവ്</th>
<th>ബാലൻസ്</th>
</tr>

<tr>
<td id="month"></td>
<td id="income"></td>
<td id="expense"></td>
<td id="balance"></td>
</tr>
</table>

</section>

<script>
fetch("data.json")
.then(response => response.json())
.then(data => {
document.getElementById("meeting").innerText = data.meeting;
document.getElementById("old_balance").innerText = "₹" + data.old_balance;
document.getElementById("month").innerText = data.month;
document.getElementById("income").innerText = "₹" + data.income;
document.getElementById("expense").innerText = "₹" + data.expense;
document.getElementById("balance").innerText = "₹" + data.balance;
});
</script>

</body>
</html>
